name: 'actions/build'
description: 'Building project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: download dependencies
      uses: actions/download-artifact@v8
      with:
        name: dependencies

    - name: building node project
      if: hashFiles('package.json') != ''
      run: npm run build
      shell: bash

    - name: building python project
      if: hashFiles('pyproject.toml') != ''
      run: |
        pip install .[dev]
        export PATH=$PATH:/app/.local/bin
        poetry build
      shell: bash
